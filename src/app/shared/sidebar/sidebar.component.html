<aside class="sidebar">
  <button
    class="nav-toggle"
    type="button"
    [attr.aria-expanded]="open()"
    aria-controls="primary-nav"
    (click)="toggle()"
  >
    <span class="nav-toggle__bar"></span>
    <span class="nav-toggle__label">Menu</span>
  </button>

  <nav id="primary-nav" class="nav" [class.nav--open]="open()" aria-label="Primary">
    @for (group of nav; track group.label) {
      <div class="nav__group">
        <p class="nav__group-label">{{ group.label }}</p>
        <ul class="nav__list">
          @for (link of group.links; track link.path) {
            <li>
              <a
                [routerLink]="link.path"
                routerLinkActive="nav__link--active"
                [routerLinkActiveOptions]="{ exact: link.path === '/' }"
                (click)="close()"
              >{{ link.label }}</a>
            </li>
          }
        </ul>
      </div>
    }
  </nav>

  @if (profile$ | async; as profile) {
    <div class="contact">
      <address class="contact__lines">
        @for (line of profile.contact.address; track line) {
          <span>{{ line }}</span>
        }
      </address>
    </div>
  }
</aside>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # Serve under the repository path, e.g. https://<user>.github.io/
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npx ng build --configuration production --base-href "/${REPO_NAME}/"

      - name: Add SPA fallback + disable Jekyll
        run: |
          OUT="dist/drlongwei-portfolio/browser"
          # Prerendering emits a client-render shell (index.csr.html); use it as
          # the fallback so unknown paths boot cleanly and the router redirects.
          cp "$OUT/index.csr.html" "$OUT/404.html"
          touch "$OUT/.nojekyll"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/drlongwei-portfolio/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
